<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riyad us-Saliheen PDF Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg: #f4f1ea;
            --panel: #fffdf8;
            --panel-2: #f8f3e8;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #d6c7a8;
            --accent: #0f766e;
            --accent-2: #134e4a;
            --header: #f0e6d2;
            --shadow: 0 18px 40px rgba(50, 36, 12, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 26%),
                radial-gradient(circle at top right, rgba(19, 78, 74, 0.08), transparent 22%),
                linear-gradient(180deg, #fcfaf5 0%, var(--bg) 100%);
            color: var(--text);
            padding: 18px 14px 36px;
        }

        .wrap {
            max-width: 860px;
            margin: 0 auto;
        }

        .hero {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at top right, rgba(15, 118, 110, 0.18), transparent 32%),
                linear-gradient(145deg, rgba(15, 118, 110, 0.14), rgba(250, 247, 240, 0.96));
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 28px 22px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
            text-align: left;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            right: -40px;
            bottom: -55px;
            border-radius: 50%;
            background: rgba(15, 118, 110, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.9rem, 4vw, 2.6rem);
            line-height: 1;
            color: var(--accent-2);
            letter-spacing: -0.03em;
        }

        .bismillah-arabic {
            margin: 0 0 10px;
            font-size: clamp(1rem, 2vw, 1.2rem);
            line-height: 1.35;
            color: var(--accent-2);
            opacity: 0.9;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 12px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(15, 118, 110, 0.18);
            color: var(--accent-2);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .subtext {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 1rem;
            max-width: 36rem;
            line-height: 1.6;
        }

        .source-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 8px 0 0;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--accent-2);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s, transform 0.2s;
        }

        .source-link:hover {
            background: rgba(255, 255, 255, 0.92);
            transform: translateY(-1px);
        }

        .panel {
            background: rgba(255, 253, 248, 0.9);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 24px 52px rgba(50, 36, 12, 0.1);
            overflow: hidden;
            padding: 22px;
            backdrop-filter: blur(12px);
        }

        .search-section {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: end;
            margin-bottom: 14px;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .search-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .search-group label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }

        .search-group input {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 1.02rem;
            min-width: 180px;
            background: #fff;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: inset 0 1px 2px rgba(31, 41, 55, 0.04);
        }

        .search-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        }

        .search-btn {
            padding: 14px 22px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.2s, opacity 0.2s;
            min-height: 52px;
            box-shadow: 0 12px 22px rgba(15, 118, 110, 0.22);
        }

        .search-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 28px rgba(15, 118, 110, 0.26);
        }

        .search-btn:active {
            transform: translateY(1px);
        }

        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .nav-btn {
            flex: 1 1 180px;
            padding: 13px 18px;
            min-width: 0;
        }

        .status-text {
            min-height: 1.5rem;
            margin-bottom: 16px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .helper-text {
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .reference-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .reference-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(19, 78, 74, 0.06);
            color: var(--accent-2);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s, transform 0.15s, border-color 0.2s;
        }

        .reference-link:hover {
            background: rgba(19, 78, 74, 0.12);
            border-color: rgba(15, 118, 110, 0.35);
            transform: translateY(-1px);
        }

        #content {
            min-height: 200px;
        }

        .hadith-container {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 22px;
            line-height: 1.8;
            color: var(--text);
            box-shadow: 0 14px 28px rgba(50, 36, 12, 0.08);
            animation: fadeUp 0.3s ease;
        }

        .hadith-number {
            display: inline-flex;
            align-items: center;
            font-weight: 700;
            color: var(--accent);
            font-size: 0.95rem;
            margin-bottom: 14px;
            padding: 8px 12px;
            background: rgba(15, 118, 110, 0.08);
            border-radius: 999px;
        }

        .hadith-text {
            text-align: left;
            margin-bottom: 16px;
            font-size: 1.02rem;
            line-height: 1.9;
        }

        .hadith-source {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .commentary-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px dashed var(--border);
        }

        .commentary-label {
            display: inline-block;
            background: rgba(102, 126, 234, 0.1);
            color: var(--accent-2);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .commentary-text {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.7;
            text-align: justify;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid #c00;
            border: 1px solid #f0a;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            color: var(--accent);
            font-size: 1rem;
            padding: 40px 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .ai-links {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-top: 16px;
        }

        .ai-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 14px;
            background: rgba(15, 118, 110, 0.08);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--accent-2);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, border-color 0.2s;
        }

        .ai-link:hover {
            background: rgba(15, 118, 110, 0.15);
            transform: translateY(-1px);
            border-color: rgba(15, 118, 110, 0.35);
        }

        .ai-link:active {
            transform: translateY(0);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 12px 12px calc(20px + env(safe-area-inset-bottom));
            }

            .hero {
                padding: 22px 16px;
                border-radius: 24px;
            }

            .eyebrow {
                font-size: 0.72rem;
                margin-bottom: 10px;
            }

            .panel {
                padding: 16px;
                border-radius: 22px;
            }

            .search-section {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .search-group input {
                width: 100%;
                min-width: 0;
                font-size: 1rem;
            }

            .search-btn {
                width: 100%;
                min-height: 54px;
            }

            .nav-actions {
                position: sticky;
                bottom: 10px;
                z-index: 5;
                padding: 10px;
                background: rgba(255, 253, 248, 0.9);
                border: 1px solid rgba(214, 199, 168, 0.8);
                border-radius: 18px;
                box-shadow: 0 18px 30px rgba(50, 36, 12, 0.12);
                backdrop-filter: blur(12px);
            }

            .nav-btn {
                width: 100%;
            }

            .hadith-container {
                padding: 16px;
            }

            .source-link {
                width: 100%;
                text-align: center;
                margin: 10px 0 0;
            }

            .ai-links {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .reference-links {
                flex-direction: column;
            }

            .ai-link {
                width: 100%;
                text-align: center;
                min-height: 50px;
            }

            .reference-link {
                width: 100%;
                min-height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="hero">
            <p class="eyebrow">Riyad us-Saliheen Reader</p>
            <p class="bismillah-arabic">Bismillah ir-Rahman ir-Rahim</p>
            <h1>Riyad us-Saliheen</h1>
            <p class="subtext">Browse by hadith number, move quickly with previous and next, and send the full text to your AI tool without losing content on mobile.</p>
            <a href="https://islamicfoundation.ie/site/assets/files/1068/riyad-us-saliheen.pdf" target="_blank" class="source-link">
                View Full PDF Source
            </a>
        </section>

        <div class="panel">
            <div class="search-section">
                <div class="search-group">
                    <label for="hadithNum">Enter Hadith Number:</label>
                    <input type="number" id="hadithNum" placeholder="e.g., 1, 25, 100" min="1" value="1">
                </div>
                <button class="search-btn" id="searchBtn">Search Hadith</button>
            </div>
            <div class="nav-actions">
                <button class="search-btn nav-btn" id="prevBtn" disabled>Previous Hadith</button>
                <button class="search-btn nav-btn" id="nextBtn" disabled>Next Hadith</button>
            </div>
            <div id="status" class="status-text"></div>

            <div id="content">
                <div class="loading">
                    <div class="spinner"></div>
                    <span>Enter a hadith number and click search</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        const PDF_URL = "https://islamicfoundation.ie/site/assets/files/1068/riyad-us-saliheen.pdf";
        let pdfDoc = null;
        const allPageData = {};

        const hadithInput = document.getElementById("hadithNum");
        const searchBtn = document.getElementById("searchBtn");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const contentDiv = document.getElementById("content");
        const statusDiv = document.getElementById("status");
        let currentHadithNum = null;
        let bookLinesCache = null;
        let hadithIndexCache = null;

        async function loadPDF() {
            try {
                pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
                statusDiv.textContent = `PDF loaded (${pdfDoc.numPages} pages)`;
            } catch (error) {
                contentDiv.innerHTML = `<div class="error">Error loading PDF: ${error.message}</div>`;
                statusDiv.textContent = "Unable to load the PDF.";
                console.error("PDF loading error:", error);
            }
        }

        function isBoldFont(fontName) {
            return /bold|black|heavy|demi|semibold/i.test(fontName || "");
        }

        async function getPageData(pageNum) {
            if (allPageData[pageNum]) {
                return allPageData[pageNum];
            }

            try {
                const page = await pdfDoc.getPage(pageNum);
                const textContent = await page.getTextContent();
                const lines = textContent.items
                    .reduce((groupedLines, item) => {
                        if (!item.str) {
                            return groupedLines;
                        }

                        const y = Math.round(item.transform[5]);
                        const x = Math.round(item.transform[4]);
                        const lastLine = groupedLines[groupedLines.length - 1];
                        const part = {
                            text: item.str,
                            x,
                            isBold: isBoldFont(item.fontName)
                        };

                        if (!lastLine || Math.abs(lastLine.y - y) > 2) {
                            groupedLines.push({ y, parts: [part] });
                            return groupedLines;
                        }

                        lastLine.parts.push(part);
                        return groupedLines;
                    }, [])
                    .map((line) => {
                        const sortedParts = line.parts.sort((a, b) => a.x - b.x);
                        const text = sortedParts.map((part) => part.text).join(" ").replace(/\s+/g, " ").trim();
                        const firstMeaningfulPart = sortedParts.find((part) => part.text.trim());

                        return {
                            text,
                            firstPartBold: Boolean(firstMeaningfulPart?.isBold),
                            firstPartX: firstMeaningfulPart?.x ?? 0
                        };
                    })
                    .filter(Boolean)
                    .filter((line) => line.text);

                const pageMinX = lines.reduce((minX, line) => Math.min(minX, line.firstPartX ?? Infinity), Infinity);
                const pageData = {
                    lines: lines.map((line) => ({
                        ...line,
                        pageMinX
                    })),
                    text: lines.map((line) => line.text).join("\n")
                };

                allPageData[pageNum] = pageData;
                return pageData;
            } catch (error) {
                console.error(`Error extracting text from page ${pageNum}:`, error);
                return { lines: [], text: "" };
            }
        }

        function escapeRegExp(text) {
            return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        }

        function isChapterHeading(text) {
            return /^\s*CHAPTER\s+\d+\s*:/im.test(text);
        }

        function normalizeLine(text) {
            return text.replace(/\s+/g, " ").trim();
        }

        function isLikelyNarratorLine(body) {
            // PRIMARY PATTERN: "Narrated" + Narrator + "(May Allah...)" + "reported/narrated"
            // This is the MOST RELIABLE and matches actual hadith starts
            if (/^Narrated\s+.+?\s*\(May Allah be pleased/i.test(body) && /\b(reported|narrated)\b/i.test(body)) {
                return true;
            }

            // Pattern 2: Just starts with "Narrated" followed by any text
            if (/^Narrated\b/i.test(body)) {
                return true;
            }

            // Pattern 3: Narrator pattern with full structure: "Name bin Name (May Allah...) reported:"
            // Must have actual narrator markers (bin/ibn/Al-/Abu) AND action verb
            if (/^[A-Z][a-z\`\'-]*\s+(?:bin|ibn|Al-|Aba|Abu)[\w\s\`\'-]*\s*\(May Allah be pleased.*?\)\s*\b(reported|narrated)\b/i.test(body)) {
                return true;
            }

            // Pattern 4: Has complete structure: "(May Allah...)" + "reported/narrated"
            // This ensures we only match when both markers are present
            if (/\(May Allah be pleased .*?\)/i.test(body) && /\b(reported|narrated)\b/i.test(body)) {
                return true;
            }

            return false;
        }

        function isNearLeftMargin(line) {
            const pageMinX = Number.isFinite(line.pageMinX) ? line.pageMinX : line.firstPartX;
            return typeof line.firstPartX === "number" && typeof pageMinX === "number" && line.firstPartX <= pageMinX + 12;
        }

        function getHadithStartMatch(lines, index, expectedNum = null) {
            const line = lines[index];
            const normalized = normalizeLine(line?.text || "");
            const match = normalized.match(/^(\d{1,4})(?:\s*\.)?\s*(.*)$/);
            if (!match) {
                return null;
            }

            const lineNumber = parseInt(match[1], 10);
            if (expectedNum !== null && lineNumber !== expectedNum) {
                return null;
            }

            const body = match[2];
            
            // STRICT FILTER 1: Skip if starts with "Commentary"
            if (/^Commentary\s*:/i.test(body)) {
                return null;
            }

            // STRICT FILTER 2: Skip obvious commentary points
            // Commentary often starts with: "This Hadith...", "1. This leads...", "2. It is permissible...", etc.
            // These are typically short analysis points that don't have narrator patterns
            if (/^(This|It|The|There|Any|All|One|What|Such|Like|Both|However|Moreover|Furthermore|Therefore|Hence|Thus|Conclusion|Note)\s+/i.test(body)) {
                // If no hadith markers (Narrated, reported, etc.) in this line AND next line, it's commentary
                const nextLine = normalizeLine(lines[index + 1]?.text || "");
                if (!/\b(Narrated|reported|narrated)\b/i.test(body) && !/\b(Narrated|reported|narrated)\b/i.test(nextLine)) {
                    return null;
                }
            }

            // STRICT FILTER 3: Names alone without proper hadith structure are rejected
            // A real hadith must have: "Narrated X (May Allah...) reported:" structure
            // or at least start with "Narrated"

            if (!isNearLeftMargin(line)) {
                return null;
            }

            // PRIMARY: Body has complete hadith structure
            if (body && isLikelyNarratorLine(body)) {
                return { lineNumber, consumedLines: 1 };
            }

            // FALLBACK: Number alone with hadith on next line(s)
            if ((!body || body === ".") && line.firstPartBold) {
                const nextLine = normalizeLine(lines[index + 1]?.text || "");
                const lineAfterNext = normalizeLine(lines[index + 2]?.text || "");

                if (isLikelyNarratorLine(nextLine)) {
                    return { lineNumber, consumedLines: 2 };
                }

                if (
                    /\(May Allah be pleased .*?\)/i.test(`${nextLine} ${lineAfterNext}`) &&
                    /\b(reported|narrated)\b/i.test(`${nextLine} ${lineAfterNext}`)
                ) {
                    return { lineNumber, consumedLines: 3 };
                }
            }

            return null;
        }

        function isHadithStartLine(lines, index, expectedNum = null) {
            return Boolean(getHadithStartMatch(lines, index, expectedNum));
        }

        function findHadithStartLineIndex(lines, hadithNum) {
            for (let index = 0; index < lines.length; index += 1) {
                if (isHadithStartLine(lines, index, hadithNum)) {
                    return index;
                }
            }

            return -1;
        }

        function findBoundaryLineIndex(lines, startIndex) {
            for (let index = startIndex; index < lines.length; index += 1) {
                const line = lines[index];
                const normalizedText = normalizeLine(line.text || "");
                if (!normalizedText) {
                    continue;
                }

                if (/^CHAPTER\s+\d+\s*:/i.test(normalizedText)) {
                    return index;
                }

                if (isHadithStartLine(lines, index)) {
                    return index;
                }
            }

            return -1;
        }

        async function collectHadithText(startPageNum, startLineIndex, initialLines) {
            let combinedLines = initialLines
                .map((line) => ({ ...line, text: normalizeLine(line.text || "") }))
                .filter((line) => line.text);
            let endPageNum = startPageNum;

            while (true) {
                const nextBoundaryIndex = findBoundaryLineIndex(combinedLines, startLineIndex + 1);
                if (nextBoundaryIndex !== -1) {
                    return {
                        text: combinedLines.slice(startLineIndex, nextBoundaryIndex).map((line) => line.text).join("\n").trim(),
                        endPageNum
                    };
                }

                if (endPageNum >= pdfDoc.numPages) {
                    return {
                        text: combinedLines.slice(startLineIndex).map((line) => line.text).join("\n").trim(),
                        endPageNum
                    };
                }

                endPageNum += 1;
                const nextPageData = await getPageData(endPageNum);
                if (!nextPageData.lines.length) {
                    return {
                        text: combinedLines.slice(startLineIndex).map((line) => line.text).join("\n").trim(),
                        endPageNum
                    };
                }

                combinedLines = combinedLines.concat(
                    nextPageData.lines
                        .map((line) => ({ ...line, text: normalizeLine(line.text || "") }))
                        .filter((line) => line.text)
                );
            }
        }

        async function buildBookLines() {
            if (bookLinesCache) {
                return bookLinesCache;
            }

            const allLines = [];

            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum += 1) {
                if (pageNum === 1 || pageNum % 20 === 0) {
                    statusDiv.textContent = `Indexing page ${pageNum} of ${pdfDoc.numPages}...`;
                }

                const pageData = await getPageData(pageNum);
                const pageLines = pageData.lines
                    .map((line) => ({
                        ...line,
                        pageNum,
                        text: normalizeLine(line.text || "")
                    }))
                    .filter((line) => line.text);

                allLines.push(...pageLines);
            }

            bookLinesCache = allLines;
            return allLines;
        }

        async function buildHadithIndex() {
            if (hadithIndexCache) {
                return hadithIndexCache;
            }

            const allLines = await buildBookLines();
            const entries = [];
            let expectedNum = 1;
            const chapterStartIndexes = [];

            for (let index = 0; index < allLines.length; index += 1) {
                if (isChapterHeading(allLines[index].text || "")) {
                    chapterStartIndexes.push(index);
                }
            }

            if (!chapterStartIndexes.length) {
                hadithIndexCache = entries;
                return entries;
            }

            for (let chapterIdx = 0; chapterIdx < chapterStartIndexes.length; chapterIdx += 1) {
                const chapterStart = chapterStartIndexes[chapterIdx];
                const chapterEnd = chapterIdx + 1 < chapterStartIndexes.length
                    ? chapterStartIndexes[chapterIdx + 1]
                    : allLines.length;

                for (let index = chapterStart + 1; index < chapterEnd; index += 1) {
                    if (index === chapterStart + 1 || index % 500 === 0) {
                        statusDiv.textContent = `Building hadith index... found ${entries.length} so far`;
                    }

                    const match = getHadithStartMatch(allLines, index, expectedNum);
                    if (!match) {
                        continue;
                    }

                    entries.push({
                        num: expectedNum,
                        startIndex: index,
                        pageNum: allLines[index].pageNum
                    });
                    expectedNum += 1;
                    index += Math.max(0, match.consumedLines - 1);
                }
            }

            hadithIndexCache = entries;
            return entries;
        }

        function extractHadithAndCommentary(text, startIdx, endIdx) {
            const hadithText = text.substring(startIdx, endIdx).trim();
            const commentaryMatch = hadithText.match(/\b(Commentary|Comment):\s*/i);

            if (commentaryMatch) {
                const commentaryIdx = hadithText.indexOf(commentaryMatch[0]);
                return {
                    hadith: hadithText.substring(0, commentaryIdx).trim(),
                    commentary: hadithText.substring(commentaryIdx + commentaryMatch[0].length).trim()
                };
            }

            return {
                hadith: hadithText,
                commentary: ""
            };
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function updateNavigationButtons() {
            const parsedValue = parseInt(hadithInput.value, 10);
            const activeHadithNum = Number.isNaN(parsedValue) ? currentHadithNum : parsedValue;

            prevBtn.disabled = !activeHadithNum || activeHadithNum <= 1;
            nextBtn.disabled = !activeHadithNum;
        }

        async function findHadith(hadithNum) {
            if (!pdfDoc) {
                contentDiv.innerHTML = '<div class="error">PDF not loaded. Please wait and try again.</div>';
                return;
            }

            hadithNum = parseInt(hadithNum, 10);
            if (Number.isNaN(hadithNum) || hadithNum < 1) {
                contentDiv.innerHTML = '<div class="error">Please enter a valid hadith number.</div>';
                currentHadithNum = null;
                updateNavigationButtons();
                return;
            }

            contentDiv.innerHTML = `<div class="loading"><div class="spinner"></div><span>Searching for Hadith ${hadithNum}...</span></div>`;
            statusDiv.textContent = "Searching...";
            searchBtn.disabled = true;

            try {
                const entries = await buildHadithIndex();
                const allLines = await buildBookLines();
                const currentEntry = entries.find((entry) => entry.num === hadithNum);

                if (!currentEntry) {
                    contentDiv.innerHTML = `<div class="error">Hadith ${hadithNum} not found in the PDF index.</div>`;
                    currentHadithNum = hadithNum;
                    hadithInput.value = String(hadithNum);
                    statusDiv.textContent = `Hadith ${hadithNum} not found`;
                    updateNavigationButtons();
                    return;
                }

                const nextEntry = entries.find((entry) => entry.num === hadithNum + 1);
                const endIndex = nextEntry ? nextEntry.startIndex : allLines.length;
                const selectedLines = allLines.slice(currentEntry.startIndex, endIndex);
                const rawText = selectedLines.map((line) => line.text).join("\n").trim();
                const extracted = extractHadithAndCommentary(rawText, 0, rawText.length);
                const normalizedHadith = escapeHtml(extracted.hadith.replace(/\s+/g, " ").trim());
                const normalizedCommentary = escapeHtml(extracted.commentary.replace(/\s+/g, " ").trim());
                const aiPrompt = [
                    `Hadith ${hadithNum} from Riyad us-Saliheen.`,
                    extracted.hadith.replace(/\s+/g, " ").trim(),
                    extracted.commentary ? `Commentary: ${extracted.commentary.replace(/\s+/g, " ").trim()}` : null
                ].filter(Boolean).join(" ");
                const hadithQuery = encodeURIComponent(aiPrompt);
                const sunnahUrl = `https://sunnah.com/riyadussalihin:${hadithNum}`;
                const endPageNum = selectedLines[selectedLines.length - 1]?.pageNum ?? currentEntry.pageNum;

                let html = `
                    <div class="hadith-container">
                        <div class="hadith-number">Hadith ${hadithNum}</div>
                        <div class="hadith-text">${normalizedHadith}</div>
                        <div class="hadith-source">${endPageNum > currentEntry.pageNum ? `Found on pages ${currentEntry.pageNum}-${endPageNum}` : `Found on page ${currentEntry.pageNum}`} of ${pdfDoc.numPages}</div>
                        <div class="reference-links">
                            <a href="${sunnahUrl}" target="_blank" rel="noopener noreferrer" class="reference-link">Open on Sunnah.com</a>
                        </div>
                        <div class="ai-links">
                            <a href="https://chatgpt.com/?q=${hadithQuery}" target="_blank" rel="noopener noreferrer" class="ai-link">Ask ChatGPT</a>
                            <a href="https://claude.ai/new?q=${hadithQuery}" target="_blank" rel="noopener noreferrer" class="ai-link">Ask Claude</a>
                            <a href="https://www.perplexity.ai/search?q=${hadithQuery}" target="_blank" rel="noopener noreferrer" class="ai-link">Search Perplexity</a>
                        </div>
                        <div class="helper-text">AI links open directly with the hadith text attached to the query.</div>
                `;

                if (extracted.commentary) {
                    html += `
                        <div class="commentary-section">
                            <div class="commentary-label">Commentary</div>
                            <div class="commentary-text">${normalizedCommentary}</div>
                        </div>
                    `;
                }

                html += "</div>";

                contentDiv.innerHTML = html;
                currentHadithNum = hadithNum;
                hadithInput.value = String(hadithNum);
                statusDiv.textContent = endPageNum > currentEntry.pageNum
                    ? `Found on pages ${currentEntry.pageNum}-${endPageNum}`
                    : `Found on page ${currentEntry.pageNum}`;
                updateNavigationButtons();
            } catch (error) {
                contentDiv.innerHTML = `<div class="error">Error searching PDF: ${error.message}</div>`;
                statusDiv.textContent = "Search failed.";
                console.error("Search error:", error);
            } finally {
                searchBtn.disabled = false;
            }
        }

        searchBtn.addEventListener("click", () => {
            const hadithNum = hadithInput.value.trim();
            if (hadithNum) {
                findHadith(hadithNum);
            }
        });

        prevBtn.addEventListener("click", () => {
            const baseNum = parseInt(hadithInput.value || currentHadithNum, 10);
            if (!Number.isNaN(baseNum) && baseNum > 1) {
                findHadith(baseNum - 1);
            }
        });

        nextBtn.addEventListener("click", () => {
            const baseNum = parseInt(hadithInput.value || currentHadithNum, 10);
            if (!Number.isNaN(baseNum)) {
                findHadith(baseNum + 1);
            }
        });

        hadithInput.addEventListener("keypress", (event) => {
            if (event.key === "Enter") {
                searchBtn.click();
            }
        });

        hadithInput.addEventListener("input", () => {
            updateNavigationButtons();
        });

        document.addEventListener("DOMContentLoaded", async () => {
            await loadPDF();

            const params = new URLSearchParams(window.location.search);
            const hadithParam = params.get("hadith");
            if (hadithParam) {
                hadithInput.value = hadithParam;
                setTimeout(() => findHadith(hadithParam), 500);
            } else {
                setTimeout(() => findHadith(1), 500);
            }

            updateNavigationButtons();
        });
    </script>
</body>
</html>
