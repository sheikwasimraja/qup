<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f766e'/%3E%3Ctext x='32' y='42' font-size='28' text-anchor='middle' fill='white' font-family='Arial'%3EQ%3C/text%3E%3C/svg%3E" />
  <title>Quran Reference Hub</title>
  <style>
    :root {
      --bg: #f6f1e6;
      --panel: #fffdf8;
      --border: #dccca7;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --shadow: 0 22px 55px rgba(68, 49, 13, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.1), transparent 24%),
        linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
      padding: 16px;
    }

    .wrap {
      max-width: 1600px;
      margin: 0 auto;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 14px 16px;
      margin-bottom: 12px;
      text-align: center;
      background: linear-gradient(135deg, rgba(15,118,110,0.12), rgba(250,247,240,0.92));
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(1.4rem, 2.2vw, 2rem);
      line-height: 1.1;
    }

    .subtext {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .bismillah-arabic {
      margin: 0 0 4px;
      font-size: clamp(1.2rem, 2vw, 1.7rem);
      line-height: 1.35;
      color: #134e4a;
    }

    .bismillah-english {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.88rem;
      font-style: italic;
    }

    .panel {
      padding: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fff;
      padding: 16px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .card p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.92rem;
      min-height: 2.7em;
    }

    .card a,
    .back-link {
      display: inline-block;
      text-decoration: none;
      color: white;
      background: var(--accent);
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 600;
    }

    .back {
      margin-top: 18px;
    }

    @media (max-width: 640px) {
      body { padding: 10px; }
      .hero {
        padding: 12px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <p class="bismillah-arabic">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
      <p class="bismillah-english">In the name of Allah, the Most Compassionate, the Most Merciful.</p>
      <h1 id="title">Quran Reference Hub</h1>
      <p class="subtext" id="subtitle">Reference links for the selected verse.</p>
    </section>

    <section class="panel">
      <div class="grid" id="linksGrid"></div>
      <div class="back">
        <a class="back-link" href="./quran-progress-tracker.html">Back to tracker</a>
      </div>
    </section>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sura = params.get("sura") || "";
    const verse = params.get("verse") || "";
    const verseNum = sura && verse ? `${sura}:${verse}` : "Unknown";

    const referenceStorageKey = "quran-reference-settings";
    const queryText = encodeURIComponent(`quran tafsir ${verseNum}`);
    const referenceConfigs = [
      {
        id: "chatgpt",
        name: "ChatGPT",
        description: "AI-assisted tafsir and explanation search.",
        buildUrl: () => `https://chatgpt.com/?q=${queryText}`
      },
      {
        id: "perplexity",
        name: "Perplexity",
        description: "AI-powered search for verse-related references.",
        buildUrl: () => `https://www.perplexity.ai/search?q=${queryText}`
      },
      {
        id: "claude",
        name: "Claude",
        description: "AI-assisted verse search and explanation workspace.",
        buildUrl: () => `https://claude.ai/new?q=${queryText}`
      },
      {
        id: "quranmorphology",
        name: "Quran Morphology",
        description: "Morphology overview for the selected ayah.",
        buildUrl: () => `https://quranmorphology.com/ayah/${encodeURIComponent(sura)}:${encodeURIComponent(verse)}`
      },
      {
        id: "corpus_word_by_word",
        name: "Corpus Word by Word",
        description: "Word-by-word breakdown from Corpus Quran.",
        buildUrl: () => `https://corpus.quran.com/wordbyword.jsp?chapter=${encodeURIComponent(sura)}&verse=${encodeURIComponent(verse)}`
      },
      {
        id: "tafheem",
        name: "Tafheem-ul-Quran",
        description: "Islamic Studies tafsir page for the verse.",
        buildUrl: () => `https://islamicstudies.info/tafheem-orig.php?sura=${encodeURIComponent(sura)}&verse=${encodeURIComponent(verse)}`
      },
      {
        id: "corpus_treebank",
        name: "Corpus Treebank",
        description: "Syntactic treebank view from Corpus Quran.",
        buildUrl: () => `https://corpus.quran.com/treebank.jsp?chapter=${encodeURIComponent(sura)}&verse=${encodeURIComponent(verse)}`
      },
      {
        id: "islam_awakened",
        name: "Islam Awakened",
        description: "Parallel translations and resources for the verse.",
        buildUrl: () => `https://www.islamawakened.org/quran/${encodeURIComponent(sura)}/${encodeURIComponent(verse)}`
      },
      {
        id: "quranwbw",
        name: "QuranWBW",
        description: "Word-by-word reading page.",
        buildUrl: () => `https://quranwbw.com/${encodeURIComponent(sura)}#${encodeURIComponent(verse)}`
      },
      {
        id: "quranwbw_morphology",
        name: "QuranWBW Morphology",
        description: "Morphology page from QuranWBW.",
        buildUrl: () => `https://quranwbw.com/morphology/${encodeURIComponent(sura)}:${encodeURIComponent(verse)}`
      },
      {
        id: "surahquran_tafsir",
        name: "Surah Quran Tafsir",
        description: "English tafsir page for the selected ayah.",
        buildUrl: () => `https://surahquran.com/tafsir-english-aya-${encodeURIComponent(verse)}-sora-${encodeURIComponent(sura)}.html`
      }
    ];

    function loadSelectedReferenceIds() {
      const defaultIds = referenceConfigs.map((config) => config.id);
      const raw = window.localStorage.getItem(referenceStorageKey);
      if (!raw) {
        return defaultIds;
      }

      try {
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) {
          return defaultIds;
        }
        return parsed.filter((id) => defaultIds.includes(id));
      } catch (error) {
        return defaultIds;
      }
    }

    const selectedReferenceIds = loadSelectedReferenceIds();
    const links = referenceConfigs
      .filter((config) => selectedReferenceIds.includes(config.id))
      .map((config) => ({
        name: config.name,
        description: config.description,
        url: config.buildUrl()
      }));

    document.getElementById("title").textContent = `Verse References for ${verseNum}`;
    document.getElementById("subtitle").textContent = links.length
      ? `${links.length} reference link${links.length === 1 ? "" : "s"} available for verse ${verseNum}.`
      : `No reference links are currently selected for verse ${verseNum}.`;

    const grid = document.getElementById("linksGrid");

    if (!links.length) {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <h2>No Sources Selected</h2>
        <p>Open Reference Settings in the tracker and select the sources you want to use for this verse.</p>
        <a href="./quran-reference-settings.html">Open Settings</a>
      `;
      grid.appendChild(card);
    }

    links.forEach((link) => {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <h2>${link.name}</h2>
        <p>${link.description}</p>
        <a href="${link.url}" target="_blank" rel="noopener noreferrer">Open</a>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
